# Transitive-delegation vocabulary for the RECURSIVE drill-conformance net
# (evidence/transitive.py + evidence/conformance.py::check_nested_conformance).
#
# A drill view (attention internals, FFN, router, expert, indexer, vision) is
# drawn BELOW the resolution of its sub-module's own forward() AST — the heavy
# math lives inside library calls (scaled_dot_product_attention), free helpers
# (apply_rotary_pos_emb, eager_attention_forward) and delegated callables (the
# diffusers attention PROCESSOR, the FeedForward `net` ModuleList).  The
# transitive extractor FOLLOWS those delegations to a leaf op-set; this file is
# the only place that leaf vocabulary lives.  Flat flow style so it parses
# without PyYAML (codebase doctrine).

# --- attention-compute leaves -------------------------------------------------
# The score/softmax/apply-V computation, however dispatched, is the pair
# {dot_product, activation(softmax)}.  These call tokens TERMINATE transitive
# resolution at that pair: the SDPA/flash/eager library entry points and the
# standard `attention_interface = ALL_ATTENTION_FUNCTIONS[...]` dispatch variable
# (transformers' universal pattern — a general signature, never a model name).
attention_compute_ops: [dot_product, activation]
attention_compute_tokens: [scaled_dot_product_attention, sdpa_attention_forward, eager_attention_forward, flash_attention_forward, flex_attention_forward, flash_attn_func, flash_attn_varlen_func, attention_interface, _attention_forward]

# --- presentation / structural DRAWN kinds -----------------------------------
# Drawn node kinds that are NOT computational ops to diff (ports, layout sugar,
# and the drill-INTO container glyphs that have their OWN drill + diff).  Dropped
# from a drill's drawn op-set before the op-kind diff.
drawn_ignore: [port, formula, subgraph, opaque, output, source, embedding, router, expert, shared_expert]

# Drawn node kind -> canonical code op alphabet ("drawn=code"); only kinds whose
# drawn spelling differs from the code spelling need a row.
drawn_op_map: [select=route]

# --- semantic presence kinds (NOT op-kinds) ----------------------------------
# rope / cache carry no distinct op-KIND in code (apply_rotary is a `*`+`+`+cat;
# a cache write is `.update`), so they are DROPPED from the op-kind diff and
# verified by SIGNATURE-TOKEN presence in the transitive closure instead — drawn
# iff a marker is reachable, fabricated iff drawn without it.  Same rail
# fact_conformance uses for the block-level NoPE claim, at drill altitude.
semantic_kinds: [rope, cache]
semantic_rope_markers: [rotary, rope, rotate_half, freqs_cis, apply_rope]
semantic_cache_markers: [past_key_value, kv_cache, cache_kwargs, _update_cache]

# Library-helper call tokens whose op-kinds we know without a body (terminal).
# Kept tiny + general: each is a torch/stdlib primitive, not a model symbol.
# "name=op[,op]"; an empty RHS means the helper contributes no op (pure plumbing).
library_helpers: [repeat_kv=reshape, dropout=]

# --- drill ROLE classification + diff direction ------------------------------
# Each rendered drill (render-log `view_key`: gqa-attn / mla / ffn / expert_1 /
# moe_router / dsa_indexer / moe / vision-encoder …) is classified to a ROLE by
# substring (checked IN ORDER, first hit wins — so `moe_router` matches `router`
# before the composite `moe`).  The role's CATEGORY (below) picks which diff runs.
# "role=sub1,sub2" — view_key substrings.
# BLOCK style (one `- role=v1,v2` per line) is REQUIRED for multi-value entries:
# a flow list `[role=a,b, …]` would comma-split `a,b` into separate items and drop
# the tail (so `attn,mla` silently lost `mla`).  Order matters (first hit wins).
drill_role_markers:
  - attention=attn,mla
  - ffn=ffn,mlp
  - expert=expert
  - vision_attention=vision-self-attention
  - vision_mlp=vision-mlp
  - route=router,topk
  - indexer=indexer,dsa
  - composite=moe,vision-encoder,mtp-transformer-block,mtp-block

# A LEAF role's drawn closure is diffed against the union transitive closure of the
# model's reachable sub-module classes carrying the mapped TYPE-role; "role=type_role".
drill_role_to_type: [attention=attention, ffn=ffn, expert=ffn, vision_attention=attention, vision_mlp=ffn]

# Drill CATEGORY -> which diff runs.  "role=category".  Absent = leaf_compute.
#  * leaf_compute — drawn compute ops vs the sub-module's TRANSITIVE closure
#    (attention/ffn/expert internals; the v1 net).
#  * selection — a router/indexer drill: its TOP-K (select) must back onto a code
#    `route`, its gate onto a `linear`; renormalize/bias are config-driven
#    presentation (dropped). Diffed against the SELECTION closure (ffn ∪ route
#    type-roles, which carries the folded-in topk).
#  * composite — a mini-block drawing sub-CONTAINERS (attention/ffn/expert/router):
#    a BLOCK-ALTITUDE diff (container glyph -> code op) against the union of the
#    model's block classes' OWN forward op-kinds — never the transitive closure
#    (the sub-containers each have their own leaf drill).
drill_category: [route=selection, indexer=selection, composite=composite]

# SALIENT omissions (code->diagram) per role — the ONLY missing-ops checked at
# drill altitude, because deep following brings incidental ops (a processor's
# optional residual/rescale, eager scaling) a faithful drill never draws.  A
# gated FFN/expert MUST draw its gate + activation (the dense-vs-gated bug); a
# router/indexer MUST draw its top-k (select) when the code routes.  "role=op[,op]";
# absent role = fabrication-only.
drill_salient_missing:
  - ffn=gate_mul,activation
  - expert=gate_mul,activation
  - route=route
  - indexer=route

# SELECTION presentation kinds — drawn glyphs that are config-driven, NOT compute
# ops, so they are dropped from the selection diff (like rope/cache are for leaves):
# `norm` = the renormalize box (a `/=sum` div, not an nn-norm), `embedding` = the
# e_score correction BIAS buffer.  Both are drawn from config flags the code gates
# on too, so op-presence is the wrong oracle for them.
selection_presentation_kinds: [norm, embedding]

# COMPOSITE container glyph -> the code op-kind it stands for, so a block-altitude
# diff can reconcile the drawn sub-container against the block's own forward.
# "glyph=op".  (expert/shared_expert are FFN sub-modules; router is the route gate.)
composite_container_map: [expert=ffn, shared_expert=ffn, router=route]

# Drawn-op -> code-ops that ALSO satisfy it in the fabrication check.  A drawn
# ``linear`` (a projection) is satisfied by a code ``dot_product`` too: a linear
# projection IS a matmul, and a FUSED expert/attention does it as a batched ``@``
# over stacked weight Parameters (MixtralExperts) instead of an nn.Linear call.
# "drawn=code1,code2".
drill_op_equivalents:
  - linear=linear,dot_product