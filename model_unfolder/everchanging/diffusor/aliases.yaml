# Diffusion (DiT / MMDiT) field aliases — canonical field name -> the config key
# spellings the diffusor parser tries, in order.  Kept separate from the
# transformer aliases.yaml because diffusers configs use their own vocabulary
# (FluxTransformer2DModel, SD3Transformer2DModel, PixArtTransformer2DModel, ...).
#
# Edit this file to support a new diffusion config dialect — no code change.
# Flow style ([a, b, c]) so the built-in loader works without PyYAML.

# Denoiser depth.  Flux splits depth into double-stream (num_layers) + single-
# stream (num_single_layers).  AuraFlow spells these num_mmdit_layers /
# num_single_dit_layers.  Both halves are read.
num_layers: [num_layers, num_hidden_layers, num_mmdit_layers, depth, num_blocks]
num_single_layers: [num_single_layers, num_single_dit_layers, num_single_blocks]

# Attention shape.  DiT hidden = num_attention_heads * attention_head_dim; some
# (Hunyuan-DiT) instead declare hidden_size directly and the head dim is derived.
num_attention_heads: [num_attention_heads, num_heads, n_heads]
# KV heads for grouped-query attention (Lumina-Next declares num_kv_heads:8); most
# DiTs are plain MHA (absent => KV heads == Q heads, set by the parser).
num_kv_heads: [num_kv_heads, num_key_value_heads, n_kv_heads]
attention_head_dim: [attention_head_dim, head_dim, attention_dim_head]
hidden_size: [hidden_size, inner_dim, d_model, dim]

# Positional encoding: Flux applies axial RoPE over the joint sequence; the
# per-axis dims sum to the head dim. Presence of this field => RoPE (not NoPE).
# Spelling varies: HunyuanVideo=rope_axes_dim, Lumina2=axes_dim_rope (singular
# "dim", "rope" SUFFIX — distinct from the Flux axes_dim). fact-conformance caught
# Lumina2's fabricated NoPE because this alias was missing axes_dim_rope.
axes_dims_rope: [axes_dims_rope, axes_dim, axes_dim_rope, rope_axes_dim]
mrope_section: [mrope_section, rope_sections]
rope_theta: [rope_theta]
# Learned absolute positions baked into the patch embedding (SD3 / PixArt declare
# the max grid). Presence => "position from the patch embedding"; its ABSENCE is
# NOT evidence of NoPE — Flux carries axial RoPE in the model class, not the
# config — so we only ASSERT a position scheme when the config gives a signal.
pos_embed_max_size: [pos_embed_max_size, interpolation_scale]

# QK-norm: per-head Q/K normalisation before the dot product (SD3.5 qk_norm:
# "rms_norm"; some DiTs spell it use_qk_norm / qk_layernorm). A declared,
# non-null value => the attention carries QK-norm (a Tier-3 annotation).
qk_norm: [qk_norm, use_qk_norm, qk_layernorm]

# Conditioning / stream dims.
joint_attention_dim: [joint_attention_dim]          # text stream width (Flux/SD3)
text_embed_dim: [text_embed_dim, cap_feat_dim]       # concatenated-joint text width (CogVideoX/Mochi/HunyuanVideo; Lumina2 cap_feat_dim — caption features CONCATENATED into the sequence + self-attended, NOT cross-attended)
cross_attention_dim: [cross_attention_dim, text_dim]  # cross-attn text width (PixArt; Wan: text_dim)
kv_join_dim: [context_in_dim]                        # text-K/V-join width (PRX: context_in_dim — text projected to extra K/V, CONCATENATED into the attention's K/V each block; image-only Q, no text stream)
# These are deliberately NOT aliases.  Diffusers gives them different code
# signatures: PixArt ``caption_channels`` feeds a two-linear GELU projector,
# while SD3/AuraFlow ``caption_projection_dim`` is the output width of one
# context Linear.  Collapsing them loses a real operation.
caption_input_dim: [caption_channels]
caption_projection_dim: [caption_projection_dim]
pooled_projection_dim: [pooled_projection_dim]
guidance_embeds: [guidance_embeds]

# Latent / patchify geometry.
in_channels: [in_channels, latent_channels]
out_channels: [out_channels]
patch_size: [patch_size]
sample_size: [sample_size]

# FFN width (when declared explicitly; otherwise derived from mlp_ratio * hidden).
intermediate_size: [intermediate_size, ffn_dim, mlp_dim, inner_dim]
mlp_ratio: [mlp_ratio]
hidden_act: [hidden_act, activation_fn, act_fn]

# --- UNet (SD1.5 / SD2 / SDXL / Kandinsky, UNet2DConditionModel) ---
# Conv U-net resolution stages: channels per stage + the block-type lists that
# say which stages have cross-attention, plus ResNet / transformer depth.
block_out_channels: [block_out_channels, decoder_block_out_channels]
down_block_types: [down_block_types]
up_block_types: [up_block_types]
mid_block_type: [mid_block_type]
layers_per_block: [layers_per_block, num_res_blocks]
transformer_layers_per_block: [transformer_layers_per_block]
addition_embed_type: [addition_embed_type]
# (VAE spellings folded into block_out_channels / layers_per_block above;
# DC-AE prefixes decoder_, Wan/Qwen 3D VAEs say z_dim / num_res_blocks.)
latent_channels: [latent_channels, z_dim]
# DiT MoE spellings (HiDream-I1 routes its block FFNs through experts).
num_experts: [num_routed_experts, num_experts, n_routed_experts]
num_experts_per_tok: [num_activated_experts, num_experts_per_tok, top_k]
# Video latent geometry (only CogVideoX/Allegro declare it; absent fields
# simply don't render — nothing is invented for Wan/Mochi/LTX/HunyuanVideo).
sample_height: [sample_height]
sample_width: [sample_width]
sample_frames: [sample_frames]
sample_size_t: [sample_size_t]
patch_size_t: [patch_size_t]
temporal_compression_ratio: [temporal_compression_ratio]
