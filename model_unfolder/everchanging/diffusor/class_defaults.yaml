# Architectural facts HARDCODED in the diffusers MODEL CLASS (its __init__
# defaults / module construction) and NOT declared in config.json. These are
# surfaced and MARKED as code-derived: when the config is silent, the modeling
# source is a valid evidence channel — otherwise a real RoPE / QK-norm reads as
# absent (e.g. Flux declares neither axes_dims_rope nor qk_norm in config, yet
# FluxPosEmbed applies axial RoPE and FluxAttention RMS-norms Q/K).
#
# Keyed by canonical field -> ["<_class_name>=<value>", ...]. Add a class ONLY
# after reading its actual modeling forward()/__init__. Flow style ([a, b]) so
# the built-in loader works without PyYAML.

# Axial-RoPE per-axis dims fixed in the model class (Flux __init__ default
# axes_dims_rope=(16, 56, 56); sums to head_dim 128).
# READ FROM THE SOURCE now (evidence/patterns.py::diffusion_axes_dims_rope_from_files
# — the __init__ default tuple). Flux/Flux2 both carry axes_dims_rope in config so
# the config path wins; this serves a config-silent variant. Empty offline fallback.
axes_dims_rope: []

# QK-norm applied in the model class with the config silent (FluxAttention builds
# RMSNorm norm_q/norm_k; CogVideoX builds Attention(qk_norm="layer_norm"); etc.).
# READ FROM THE SOURCE now (evidence/patterns.py::diffusion_qk_norm_from_files —
# the norm_q class / qk_norm kwarg / param-default / IfExp constant, four spellings
# across Flux·Flux2·QwenImage·Lumina2·PRX·CogVideoX·AuraFlow), so the norm TYPE
# (rms_norm vs layer_norm) is derived, not tabulated. Config-declaring models
# (SD3/Wan/LTX/Mochi/Hunyuan) take the config path and never reach the reader.
# Empty offline-only fallback.
qk_norm: []

# FFN activation fixed in the model class, not config. READ FROM THE MODELING
# SOURCE (evidence/patterns.py::diffusion_ffn_activation_from_files) for every
# model — Flux/Flux2/QwenImage/Lumina2/Wan/HunyuanVideo/SD3/AuraFlow/CogView4/
# HiDream resolve from their FeedForward construction, and PRX (whose FFN is INLINE
# with a standalone self.mlp_act = GELU(approximate="tanh")) now resolves via the
# standalone-act fallback. Empty offline-only fallback for un-resolvable source.
ffn_activation_fn: []

# Single-stream block topology — a CODE fact (the block class). Default concat_fused
# (Flux 1: separate in-projections, attn ∥ MLP-act → concat → ONE shared OUT
# projection). "parallel" = Flux 2's ViT-22B parallel block (IN-projection ALSO
# fused → QKV ‖ MLP-in, gated SwiGLU). "sequential" = NOT fused at all: a plain
# sequential gated DiT block (self-attn → FFN) over the joined [text+image]
# sequence — AuraFlow's AuraFlowSingleTransformerBlock.
# READ FROM THE SOURCE now (evidence/patterns.py::diffusion_single_stream_fusion_from_files
# — anchored to the block class the model BUILDS into a single_* ModuleList, then
# classified by its forward: real FFN + no concat → sequential; concat + MLP linears
# → concat_fused; concat + fused parallel attn → parallel). Empty offline-only fallback.
single_stream_fusion: []

# 3D (temporal · height · width) AXIAL RoPE applied to Q/K in self-attention,
# fixed in the model class and declared by NO config field (so it reads as NoPE
# unless surfaced). Video DiTs split the FULL head dim across the three axes
# inside their rotary module (WanRotaryPosEmbed: h=w=2·(d//6), t=d−h−w; other
# families use their own split). We surface the FACT — full-head_dim 3D rotary —
# and NEVER fabricate a per-axis numeric split (it is head-dim-dependent). The
# parser sets rope_dim = head_dim from this flag, which drops the false NoPE chip
# and draws the RoPE nodes on the self-attention Q/K lanes (cross-attn stays
# no-RoPE — attn2 is called with rotary_emb=None).
# RoPE is now READ FROM THE MODELING SOURCE (evidence/patterns.py::
# diffusion_rope_from_files, the same rotary evidence fact-conformance reads) — Wan/
# Mochi/LTX/Allegro/Lumina all resolve from code and need NO row here. This table is
# now ONLY a last-resort for a video DiT whose source can't be read locally
# (custom/gated code). Empty until such a case appears — add a row only after
# confirming the source genuinely can't be resolved.
rope_3d: []

# Gating dialect: Mochi does NOT multiply a sublayer output by a bare AdaLN gate.
# It folds the per-block timestep gate into a modulated RMSNorm of the sublayer
# output (MochiModulatedRMSNorm): h = h + RMSNorm(sublayer) · tanh(gate). So the
# gate is a real norm op (a quiet box), not a Tier-2 × connector — drawing a ×
# here fabricates a gate_mul the forward never does.
# READ FROM THE SOURCE now (evidence/patterns.py::diffusion_gate_via_norm_from_files
# — a *Modulated*Norm class that gates the normed output by a scale with NO additive
# FiLM shift, distinguishing it from a standard AdaLN FiLM norm like Sana's). Empty
# offline-only fallback.
gate_via_norm: []

# Pre-cross-attention norm presence. The DEFAULT is now NO pre-norm (the verified
# cross-attn DiTs — PixArt/Sana/LTX — apply attn2 to the raw hidden; Wan, which DOES
# pre-norm, declares cross_attn_norm=True in its config). This key lists the rare
# models that HAVE the pre-norm but DON'T declare it in config (currently none —
# Wan uses the config flag). Add "<Class>=true" here only after reading the block's
# forward() and confirming a norm precedes attn2.
cross_attn_norm: []

# Self-attention KIND when the model class fixes a non-softmax processor and the
# config is silent. Sana's block builds attn1 with SanaLinearAttnProcessor2_0 —
# ReLU-kernel LINEAR attention (its defining efficiency feature) — while attn2
# (cross) stays standard softmax. Surfaced so the self-attn drill draws the linear
# path (kernel map → linear mix), not a fabricated softmax QK^T.
# Attention algorithm is now READ FROM THE SOURCE (evidence/patterns.py::
# diffusion_attn_kind_from_files — the same *LinearAttn* processor signal
# fact-conformance reads). Sana resolves from code and needs NO row. Last-resort
# only for un-resolvable source; empty until such a case appears.
self_attn_kind: []

# FFN kind when the block class fixes a non-MLP feed-forward and the config is
# silent. Sana's block builds self.ff = GLUMBConv — a gated CONV Mix-FFN (1×1 conv
# expand → depthwise 3×3 conv → SiLU gate → 1×1 conv project), not a Linear MLP.
# READ FROM THE SOURCE now (evidence/patterns.py::diffusion_ffn_kind_from_files —
# the `conv_ffn` class markers); empty offline-only fallback.
ffn_kind: []
