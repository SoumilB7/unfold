# Diffusion (DiT / MMDiT) field aliases — canonical field name -> the config key
# spellings the diffusor parser tries, in order.  Kept separate from the
# transformer aliases.yaml because diffusers configs use their own vocabulary
# (FluxTransformer2DModel, SD3Transformer2DModel, PixArtTransformer2DModel, ...).
#
# Edit this file to support a new diffusion config dialect — no code change.
# Flow style ([a, b, c]) so the built-in loader works without PyYAML.

# Denoiser depth.  Flux splits depth into double-stream (num_layers) + single-
# stream (num_single_layers); both are read.
num_layers: [num_layers, num_hidden_layers, depth, num_blocks]
num_single_layers: [num_single_layers, num_single_blocks]

# Attention shape.  DiT hidden size = num_attention_heads * attention_head_dim.
num_attention_heads: [num_attention_heads, num_heads, n_heads]
attention_head_dim: [attention_head_dim, head_dim, attention_dim_head]

# Positional encoding: Flux applies axial RoPE over the joint sequence; the
# per-axis dims sum to the head dim. Presence of this field => RoPE (not NoPE).
axes_dims_rope: [axes_dims_rope, axes_dim, rope_axes_dim]

# Conditioning / stream dims.
joint_attention_dim: [joint_attention_dim]          # text stream width (Flux/SD3)
cross_attention_dim: [cross_attention_dim]           # cross-attn text width (PixArt)
caption_projection_dim: [caption_projection_dim, caption_channels]
pooled_projection_dim: [pooled_projection_dim]
guidance_embeds: [guidance_embeds]

# Latent / patchify geometry.
in_channels: [in_channels, latent_channels]
out_channels: [out_channels]
patch_size: [patch_size]
sample_size: [sample_size]

# FFN width (when declared explicitly; otherwise derived from mlp_ratio * hidden).
intermediate_size: [intermediate_size, ffn_dim, mlp_dim, inner_dim]
mlp_ratio: [mlp_ratio]
hidden_act: [hidden_act, activation_fn, act_fn]
