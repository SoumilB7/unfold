# Per-layer macro-topology that is ARCHITECTURAL (baked into the modeling code),
# not switched by a config flag.  "code -> structure": norm placement and
# flagless parallel residual are now READ FROM the layer's forward() dataflow
# (evidence/patterns.py::decoder_layer_topology_from_files — the same AST the
# conformance nets read), NOT from a model_type identity row.
#
# The two STRUCTURE tables below are therefore EMPTY — kept only as an offline
# fallback cache for the rare case the modeling source can't be resolved locally
# (then the parser uses a row here, else the safe pre/sequential default).  Add a
# row ONLY after confirming the source genuinely can't be read; otherwise it's a
# banned per-model shortcut (the code reader already handles every installed
# family — gemma2/gemma3/olmo2/cohere = code-read, and gpt_j/phi parallel that no
# row ever listed are now caught from the forward()).
#
# Block style (one `- item` per line) so the built-in loader works without PyYAML.

# Norm placement relative to each sublayer (pre / post / double-sandwich).
# READ FROM CODE — empty fallback (see header).
norm_placement: []

# Flagless parallel-residual families (attention ∥ FFN off one input, one
# combined add).  READ FROM CODE — empty fallback (see header).
parallel_residual: []

# Offline-only cache for families that do NOT apply rotary position embedding.
# Installed source is resolved first by evidence/position.py and distinguishes
# ALiBi from a learned embedding add.  This list is consulted ONLY when the code
# oracle is genuinely missing; present-but-ambiguous source is blocking and must
# never fall through here.  A fallback rendering remains NEEDS-HUMAN.
no_rope:
  - bloom
  - mpt
  - gpt2
  - gpt_neo
  - opt
